name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Backup Directory
        run: mkdir -p backups

      - name: Install postgresql-client
        run: sudo apt-get install -y postgresql-client

      - name: Resolve Supabase Host to IPv4
        run: |
          IPV4=$(getent ahostsv4 db.pfwfhuoxmttkkwuwbcmk.supabase.co | awk '{print $1}' | head -1)
          echo "Resolved IPv4: $IPV4"
          echo "SUPABASE_IPV4=$IPV4" >> $GITHUB_ENV

      - name: Dump Database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          echo "Connecting to IP: $SUPABASE_IPV4"
          pg_dump \
            -h $SUPABASE_IPV4 \
            -p 5432 \
            -U postgres \
            -d postgres \
            --no-password \
            -f backups/backup_$(date +%Y%m%d_%H%M%S).sql
          echo "✅ Backup completed!"

      - name: Commit Backup to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "🗄️ Daily backup $(date +%Y-%m-%d)" || echo "No changes"
          git push
